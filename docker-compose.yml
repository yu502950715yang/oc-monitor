services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: oc-monitor-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/monitor.db
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: oc-monitor-frontend
    ports:
      - "3000:80"
    environment:
      - API_BASE_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000/ws
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
    driver: local